<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="gBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0C0C28"/><stop offset="100%" stop-color="#04040E"/>
    </linearGradient>
    <linearGradient id="gPlay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00F0FF"/><stop offset="50%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#FF00FF"/>
    </linearGradient>
    <linearGradient id="gRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00F0FF"/><stop offset="100%" stop-color="#FF00FF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b1"/>
      <feGaussianBlur stdDeviation="6" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowInner" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5"/>
      <feMerge><feMergeNode in="SourceGraphic"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer hexagonal ring -->
  <polygon points="32,2 56,14 56,50 32,62 8,50 8,14" fill="url(#gBg)" stroke="url(#gRing)" stroke-width="2" filter="url(#glow)"/>
  <!-- Inner decorative hexagon -->
  <polygon points="32,7 52,17 52,47 32,57 12,47 12,17" fill="none" stroke="url(#gRing)" stroke-width="0.5" opacity="0.3"/>
  <!-- Corner nodes -->
  <circle cx="32" cy="4" r="1.5" fill="#00F0FF" filter="url(#glowInner)" opacity="0.8"/>
  <circle cx="55" cy="32" r="1.5" fill="#7C3AED" filter="url(#glowInner)" opacity="0.8"/>
  <circle cx="32" cy="60" r="1.5" fill="#FF00FF" filter="url(#glowInner)" opacity="0.8"/>
  <circle cx="9" cy="32" r="1.5" fill="#00F0FF" filter="url(#glowInner)" opacity="0.8"/>
  <!-- Play triangle -->
  <polygon points="42,32 26,22 26,42" fill="url(#gPlay)" filter="url(#glowInner)"/>
  <!-- Play triangle inner highlight -->
  <polygon points="40,32 28,24 28,40" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.3"/>
  <!-- Small data dots (cyberpunk feel) -->
  <circle cx="16" cy="14" r="1" fill="#00F0FF" opacity="0.5"/>
  <circle cx="48" cy="14" r="1" fill="#FF00FF" opacity="0.5"/>
  <circle cx="48" cy="50" r="1" fill="#7C3AED" opacity="0.5"/>
  <circle cx="16" cy="50" r="1" fill="#00F0FF" opacity="0.5"/>
</svg>
