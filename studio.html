<script>
const SeedanceAPI={
  apiKey: localStorage.getItem('seedance_api_key') || '',
  deepseekKey: localStorage.getItem('deepseek_api_key') || '',
  image2Key: localStorage.getItem('image2_api_key') || '',
  seedanceMiniKey: localStorage.getItem('seedance_mini_api_key') || '',
  image2Endpoint: 'https://api.openai.com/v1/images/generations',
  endpoint: 'https://ark.cn-beijing.volces.com/api/v3/contents/generations/tasks',
  modelId: 'doubao-seedance-2-0-260128',
  setApiKey(k){this.apiKey=k;localStorage.setItem('seedance_api_key',k)},
  setDeepSeekKey(k){this.deepseekKey=k;localStorage.setItem('deepseek_api_key',k)},
  async generateVideo(params){
    if(!this.apiKey && !this.seedanceMiniKey)return{error:'API Key 未设置'};
    try{
      var content=[{type:'text',text:params.prompt||''}];
      async function blobToDataURL(burl){if(!burl||burl.indexOf('blob:')!==0)return burl;var br=await fetch(burl);var bb=await br.blob();return new Promise(function(rs2){var fr2=new FileReader();fr2.onload=function(){rs2(fr2.result)};fr2.readAsDataURL(bb)})}
      if(params.image_urls){
        var imgs=params.image_urls.split('\n').filter(function(u){return u});
        for(var i=0;i<imgs.length;i++){
          var imgUrl=await blobToDataURL(imgs[i]);
          content.push({type:'image_url',image_url:{url:imgUrl},role:'reference_image'})      }
      }
      if(params.video_urls){
        var vids=params.video_urls.split('\n').filter(function(u){return u});
        for(var i=0;i<vids.length;i++){
          var vidUrl=await blobToDataURL(vids[i]);
          content.push({type:'video_url',video_url:{url:vidUrl},role:'reference_video'})      }
      }
      var modelId = this.modelId; var apiKey = this.apiKey;
      if (params.model === 'seedance-mini') { modelId = 'doubao-seedance-2-0-mini-260615'; apiKey = this.seedanceMiniKey; }
      var body={model:modelId,content:content,duration:params.duration||11};
      var r=await fetch(this.endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},body:JSON.stringify(body)});
      if(!r.ok)throw new Error('HTTP '+r.status);
      var result=await r.json();
      console.log('Task submitted:',JSON.stringify(result).substring(0,300));
        var taskId = result.id || result.task_id || (result.data && result.data.id) || (result.data && result.data.task_id);
        if(taskId){
        var taskResult=await this.pollTask(taskId, apiKey);
        var vu=taskResult.video_url||(taskResult.output&&taskResult.output.video_url)||(taskResult.content&&taskResult.content.video_url)||(taskResult.output&&taskResult.output.video_url&&taskResult.output.video_url[0])||(taskResult.raw&&taskResult.raw.content&&taskResult.raw.content.video_url)||null;
        if(vu){console.log('Got video URL:',vu);return{id:'gen_'+Date.now(),video_url:vu,prompt:params.prompt||'',model:this.modelId,status:'completed'}};
        console.log('No video URL, raw:',JSON.stringify(taskResult).substring(0,300));
        return{id:'gen_'+Date.now(),video_url:null,prompt:params.prompt||'',model:this.modelId,status:(taskResult.status||'completed'),raw:taskResult};
      }
      return{id:'gen_'+Date.now(),video_url:null,prompt:params.prompt||'',model:this.modelId,status:'unknown',raw:result};
    }catch(e){console.error(e);return{error:'API错误: '+e.message}}
  },
  async pollTask(taskId, key){
    var pk = key || this.apiKey;
    var MAX_POLL = 180; // 15 minutes max
    for(var i=0;i<MAX_POLL;i++){
      await new Promise(function(r){setTimeout(r,5000)});
      try{
        var r=await fetch(this.endpoint+'/'+taskId,{headers:{'Content-Type':'application/json',Authorization:'Bearer '+pk}});
        if(!r.ok){console.error('Poll HTTP '+r.status);continue;}
        var st=await r.json();
        var stVal = st.status || st.state || st.task_status || st.phase || '';
        stVal = String(stVal).toLowerCase();
        console.log('Task status:',stVal,'raw:',JSON.stringify(st).substring(0,200));
        if(stVal==='succeeded'||stVal==='completed'||stVal==='success'){
          var vu=st.output&&st.output.video_url||(st.content&&st.content.video_url)||(st.output&&st.output.video_url&&st.output.video_url[0])||null;
          return{video_url:vu,status:'completed',raw:st};
        }
        if(stVal==='failed'||stVal==='error')return{error:'任务执行失败',raw:st};
      }catch(e){console.error('Poll error:',e)}
    }
    return{error:'任务超时'};
  },
  mockGenerate(p){
    var urls=['https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4','https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4','https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4','https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4'];
    return{id:'gen_'+Date.now(),video_url:urls[Math.floor(Math.random()*urls.length)],prompt:p.prompt||'',model:this.modelId,status:'completed',created_at:new Date().toISOString()}
  },
  async generateImage(prompt){
    if(!this.image2Key)return{id:'img_'+Date.now(),image_url:'https://picsum.photos/800/450?random='+Math.random(),prompt:prompt};
    try{
      var r=await fetch(this.image2Endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+this.image2Key},body:JSON.stringify({model:'dall-e-2',prompt:prompt,n:1,size:'1024x1024'})});
      if(!r.ok)throw new Error('HTTP '+r.status);
      var d=await r.json();
      return{id:'img_'+Date.now(),image_url:d.data[0].url,prompt:prompt};
    }catch(e){console.error(e);return{error:'图片API错误: '+e.message}}
  },
  async generateText(prompt,model){
    if(model==='deepseek'&&this.deepseekKey){
      try{
        var r=await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+this.deepseekKey},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],max_tokens:2048})});
        if(!r.ok)throw new Error('HTTP '+r.status);
        var d=await r.json();
        return{id:'txt_'+Date.now(),text:d.choices[0].message.content||'',title:'AI 生成结果'}
      }catch(e){console.error(e);return{error:'DeepSeek错误: '+e.message}}
    }
    return this.mockGenerateText(prompt);
  },
  mockGenerateText(prompt){
    return{id:'txt_'+Date.now(),text:'这是由 AI 生成的文本内容。\n\n当前节点: '+prompt,title:'AI 生成结果'}
  }
};

</script>

function switchPage(name) {
  document.querySelectorAll('.page').forEach(function (p) { p.classList.remove('active'); });
  var pg = document.getElementById('page-' + name);
  if (pg) pg.classList.add('active');
  document.querySelectorAll('.nav-link').forEach(function (l) { l.classList.remove('active'); });

function topologicalSort() {
  var visited = {}, result = [];
  function visit(id) {
    if (visited[id]) return; visited[id] = true;
    for (var ci = 0; ci < connections.length; ci++) { if (connections[ci].to === id) visit(connections[ci].from); }
    for (var ni = 0; ni < nodes.length; ni++) { if (nodes[ni].id === id && result.indexOf(nodes[ni]) < 0) result.push(nodes[ni]); }
  }
  for (var ni = 0; ni < nodes.length; ni++) { var def = NODE_TYPES[nodes[ni].type]; if (!def || !def.inputs || def.inputs.length === 0) visit(nodes[ni].id); }
  for (var ni = 0; ni < nodes.length; ni++) { if (result.indexOf(nodes[ni]) < 0) result.push(nodes[ni]); }
  return result;
}

async function execNode(node) {
  switch (node.type) {
    case "prompt": return { text: node.data.prompt || "" };
    case "text": var p = node.getInput("prompt") || node.data.prompt || "default"; return await SeedanceAPI.generateText(p);
    case "image": var pi = node.getInput("prompt") || node.data.prompt || "default"; if(node.data._image_url)return{id:"img_"+Date.now(),image_url:node.data._image_url,prompt:pi}; return await SeedanceAPI.generateImage(pi);
    case "video":
      var pv = node.getInput("prompt") || node.data.prompt || "default";
      pv = pv.replace(/@\w+/g,'').trim();
      var params = { prompt: pv, duration: node.data.duration || 5, ratio: node.data.ratio || "16:9", quality: node.data.quality || "720P", model: node.data.model || "seedance-2" };
      // Collect ALL reference images/videos from connected nodes
      var refImgs = [], refVids = [];
      for (var ci_v = 0; ci_v < connections.length; ci_v++) {
        if (connections[ci_v].to === node.id) {
          for (var ni_v = 0; ni_v < nodes.length; ni_v++) {
            if (nodes[ni_v].id === connections[ci_v].from && nodes[ni_v].lastResult) {
              var lr = nodes[ni_v].lastResult;
              if (lr.image_url) refImgs.push(lr.image_url);
              if (lr.video_url) refVids.push(lr.video_url);
            }
          }
        }
      }
      console.log('DEBUG refImgs:',JSON.stringify(refImgs));console.log('DEBUG refVids:',JSON.stringify(refVids));if (refImgs.length > 0) params.image_urls = refImgs.join('\n');
      if (refVids.length > 0) params.video_urls = refVids.join('\n');
      return await SeedanceAPI.generateVideo(params);
    case "preview": var res = node.getInput("video_url") || node.getInput("image_url") || node.getInput("text"); return { result: res };
    default: return {};
  }
}

async function executeWorkflow() {
  if (nodes.length === 0) { showToast("工作流为空，请先添加节点", "error"); return; }
  showToast("开始执行工作流...");
  // Show progress for ALL nodes immediately
  if (typeof nodes !== "undefined") {
    for (var pi_q = 0; pi_q < nodes.length; pi_q++) {
      var pi_node = nodes[pi_q];
      var pi_el = document.getElementById("result-" + pi_node.id);

        pi_el.style.display = "block";

        } else {
          var lbls = {"prompt":"⏳ 处理中...","text":"⏳ AI 生成中...","image":"⏳ 图片生成中...","preview":"⏳ 加载中..."};
          pi_el.innerHTML = '<div style="padding:10px;text-align:center;color:var(--text3);font-size:12px;">' + (lbls[pi_node.type] || "⏳ 处理中...") + '</div>';
        }
      }
    }
  }
  var sorted = topologicalSort();
  for (var si = 0; si < sorted.length; si++) {
    var n = sorted[si];
    var piEl = document.getElementById('result-' + n.id);
    if (piEl) {
      piEl.style.display = 'block';
      if (n.type === 'video') {
        piEl.innerHTML = '<div style="position:relative;"><video style="width:100%;border-radius:6px;display:block;background:#000;"></video><div class="gen-overlay" style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);color:#fff;font-size:14px;border-radius:6px;">\u23f3 生成中...</div></div>';
      } else {
        var pLbls = {"prompt":"\u23f3 处理中...","text":"\u23f3 AI 生成中...","image":"\u23f3 图片生成中...","preview":"\u23f3 加载中..."};
        piEl.innerHTML = '<div style="padding:10px;text-align:center;color:var(--text3);font-size:12px;">' + (pLbls[n.type] || "\u23f3 处理中...") + '</div>';
      }
    }
    try {
      var result = await execNode(n);
      n.lastResult = result;
      var resEl = document.getElementById("result-" + n.id);
      if (resEl) {
        resEl.style.display = "block";
        if (result.video_url) { var vid=resEl.querySelector('video');if(vid){vid.src=result.video_url;vid.load();vid.controls=true;vid.autoplay=true;vid.muted=true;vid.style.display='block';var ov=resEl.querySelector('.gen-overlay');if(ov)ov.remove();var dl=resEl.querySelector('.dl-btn');if(!dl){var dk=document.createElement('a');dk.href=result.video_url;dk.download='seedance_'+Date.now()+'.mp4';dk.className='dl-btn';dk.textContent='\u2b07 \u4e0b\u8f7d\u89c6\u9891';dk.style.cssText='display:inline-block;padding:6px 12px;margin-top:6px;background:#8B5CF6;color:#fff;border-radius:4px;font-size:12px;text-decoration:none;';resEl.appendChild(dk);}}else{resEl.innerHTML='<div style="position:relative;"><video src="'+result.video_url+'" controls style="width:100%;border-radius:6px;display:block;background:#000;" autoplay muted></video><a href="'+result.video_url+'" download="seedance_'+Date.now()+'.mp4" style="display:inline-block;padding:6px 12px;margin-top:6px;background:#8B5CF6;color:#fff;border-radius:4px;font-size:12px;text-decoration:none;">\u2b07 \u4e0b\u8f7d\u89c6\u9891</a></div>';}}
        else if (result.image_url) { resEl.innerHTML = '<img src="' + result.image_url + '" style="width:100%;border-radius:6px">'; }
        else if (result.text) { resEl.innerHTML = result.text.substring(0, 200); } else if (result.error) { resEl.innerHTML = '<div style="color:#ff4444;padding:8px;font-size:12px;white-space:pre-wrap;word-break:break-all;">\u274c ' + result.error + '</div>'; var ov2=resEl.querySelector('.gen-overlay');if(ov2)ov2.remove(); } else if (result.raw) { var rawErr=result.raw.error||result.raw.message||'';if(rawErr){resEl.innerHTML='<div style="color:#ff4444;padding:8px;font-size:12px;white-space:pre-wrap;word-break:break-all;">❌ '+rawErr+'</div>';var ov2=resEl.querySelector('.gen-overlay');if(ov2)ov2.remove();}else{resEl.innerHTML='<div style="padding:8px;font-size:11px;color:var(--text2);white-space:pre-wrap;word-break:break-all;">API返回:<br>'+JSON.stringify(result.raw,null,2).substring(0,500)+'</div>';}}
        else { resEl.innerHTML = "执行完成"; }
      }
      addOutput(n, result);
    } catch (e) { console.error(e); showToast("节点 " + n.id + " 执行失败", "error"); }
  }
  showToast("工作流执行完成");
}

function addOutput(node, result) {
  var body = document.getElementById("output-body"); if (!body) return;
  var empty = body.querySelector(".output-empty"); if (empty) empty.remove();
  var el = document.createElement("div"); el.className = "output-item";
  var content = "";
  if (result.video_url) content = '<video src="' + result.video_url + '" controls style="width:100%;border-radius:6px"></video>';
  else if (result.image_url) content = '<img src="' + result.image_url + '" style="width:100%;border-radius:6px">';
  else if (result.text) content = result.text.substring(0, 150);
  else content = "节点 " + node.id + " 输出";
  el.innerHTML = '<div class="output-item-label">' + (TYPE_NAMES[node.type] || node.type) + '</div><div class="output-item-value">' + content + '</div>';
  body.prepend(el);
}
