<script>
const SeedanceAPI={
  apiKey: localStorage.getItem('seedance_api_key') || '',
  deepseekKey: localStorage.getItem('deepseek_api_key') || 'sk-05c533fcaad642a7b669385d0b67b5b1',
  endpoint: 'https://ark.cn-beijing.volces.com/api/v3/contents/generations/tasks',
  modelId: 'doubao-seedance-2-0-260128',
  setApiKey(k){this.apiKey=k;localStorage.setItem('seedance_api_key',k)},
  setDeepSeekKey(k){this.deepseekKey=k;localStorage.setItem('deepseek_api_key',k)},
  async generateVideo(params){
    if(!this.apiKey)return this.mockGenerate(params);
    try{
      var content=[{type:'text',text:params.prompt||''}];
      if(params.image_urls){var imgs=params.image_urls.split('\n').filter(function(u){return u});for(var i=0;i<imgs.length;i++){content.push({type:'image_url',image_url:{url:imgs[i]},role:'reference_image'})}}
      if(params.video_urls){var vids=params.video_urls.split('\n').filter(function(u){return u});for(var i=0;i<vids.length;i++){content.push({type:'video_url',video_url:{url:vids[i]},role:'reference_video'})}}
      var body={model:this.modelId,content:content,duration:params.duration||11,ratio:params.ratio||'16:9',quality:params.quality||'720P'};
      var r=await fetch(this.endpoint,{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+this.apiKey},body:JSON.stringify(body)});
      if(!r.ok)throw new Error('HTTP '+r.status);
      var result=await r.json();
      if(result.id)return await this.pollTask(result.id);
      return result;
    }catch(e){console.error(e);return this.mockGenerate(params)}
  },
  async pollTask(taskId){
    for(var i=0;i<60;i++){
      await new Promise(function(r){setTimeout(r,5000)});
      try{
        var r=await fetch(this.endpoint+'/'+taskId,{headers:{Authorization:'Bearer '+this.apiKey}});
        var status=await r.json();
        if(status.status==='succeeded'||status.status==='completed')return status;
        if(status.status==='failed')return this.mockGenerate({});
      }catch(e){}
    }
    return this.mockGenerate({});
  },
  mockGenerate(p){
    var urls=['https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4','https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4','https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4','https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4'];
    return{id:'gen_'+Date.now(),video_url:urls[Math.floor(Math.random()*urls.length)],prompt:p.prompt||'',model:this.modelId,status:'completed',created_at:new Date().toISOString()}
  },
  async generateImage(prompt){
    return{id:'img_'+Date.now(),image_url:'https://picsum.photos/800/450?random='+Math.random(),prompt:prompt}
  },
  async generateText(prompt,model){
    if(model==='deepseek'&&this.deepseekKey){
      try{
        var r=await fetch('https://api.deepseek.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+this.deepseekKey},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],max_tokens:2048})});
        if(!r.ok)throw new Error('HTTP '+r.status);
        var d=await r.json();
        return{id:'txt_'+Date.now(),text:d.choices[0].message.content||'',title:'AI 生成结果'}
      }catch(e){console.error(e);return this.mockGenerateText(prompt)}
    }
    return this.mockGenerateText(prompt);
  },
  mockGenerateText(prompt){
    return{id:'txt_'+Date.now(),text:'这是由 AI 生成的文本内容。\n\n当前节点: '+prompt,title:'AI 生成结果'}
  }
};

</script>

function initCanvas() {

      vp.style.cursor = 'grabbing';
    }
  });
  document.addEventListener('mousemove', function (e) {

      canvasState.x = e.clientX - dragStart.x;

  document.addEventListener('mouseup', function () {

  window.addEventListener('wheel', function(e){if(e.ctrlKey||e.metaKey)e.preventDefault();},{passive:false});
  vp.addEventListener('wheel', function (e) {
    if (!e.ctrlKey && !e.metaKey) return;
    e.preventDefault();
    var d = e.deltaY > 0 ? 0.9 : 1.1;

function addNode(type, x, y) {

    else { posX = 300; posY = 200; }

function onPromptInput(el, nodeId) {

function showMentions(nodeId, query, el) {
  var dd = document.getElementById('mention-' + nodeId);

  if (refs.length === 0) { hideMentions(nodeId); return; }
  var filtered = refs.filter(function(r) { return r.name.toLowerCase().indexOf(query) >= 0; });
  if (filtered.length === 0) { hideMentions(nodeId); return; }
  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var r = filtered[i];
    html += '<div class="mention-item" data-ref="' + r.name + '" onclick="insertMention(\' + nodeId + \',\' + r.name + \')"><span class="mention-dot" style="background:' + r.color + '"></span>@' + r.name + ' <span class="mention-type">' + r.typeName + '</span></div>';

function getConnectedRefs(nodeId) {

      for (var ni = 0; ni < nodes.length; ni++) {

function getNode(id) { for (var i = 0; i < nodes.length; i++) { if (nodes[i].id === id) return nodes[i]; } return null; }
function updateNodeData(nodeId, key, val) { for (var i = 0; i < nodes.length; i++) { if (nodes[i].id === nodeId) { nodes[i].data[key] = val; return; } } }

function removeNode(id) {
  if (!confirm('确定删除此节点？')) return;
  for (var i = connections.length - 1; i >= 0; i--) { if (connections[i].from === id || connections[i].to === id) connections.splice(i, 1); }
  var el = document.getElementById(id);
  if (el && el.parentNode) el.parentNode.removeChild(el);
  for (var i = 0; i < nodes.length; i++) { if (nodes[i].id === id) { nodes.splice(i, 1); break; } }

function startConnection(nodeId, port, e) {
  e.stopPropagation();
  var target = e.target.closest('.side-port, .port-dot');
  if (!target) return;
  if (!nodeId || !port) { var pEl = target.closest('.side-port') || target; nodeId = pEl.getAttribute('data-node') || nodeId; port = pEl.getAttribute('data-port') || port; }
  if (!nodeId || !port) return;
  var dot = target.querySelector('.side-port-dot') || target;
  var dRect = dot.getBoundingClientRect();
  connecting = { active: true, sourceNode: nodeId, sourcePort: port, mouseX: dRect.left + dRect.width/2, mouseY: dRect.top + dRect.height/2, sourceX: dRect.left + dRect.width/2, sourceY: dRect.top + dRect.height/2 };
  var svg = document.getElementById('connections-layer');
  if (!svg) return;
  var line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  line.id = 'temp-line'; line.setAttribute('class', 'temp-line');
  svg.appendChild(line);
  document.addEventListener('mousemove', onConnectMove);
  document.addEventListener('mouseup', onConnectEnd);
}
function onConnectMove(e) { if (!connecting.active) return; connecting.mouseX = e.clientX; connecting.mouseY = e.clientY; updateTempLine(); }
function onConnectEnd(e) {
  if (!connecting.active) return;
  var target = e.target.closest('.side-port, .port-dot');
  if (!target) { cleanupConnection(); return; }
  if (target.classList.contains('side-port-input') || (target.classList.contains('port-dot') && target.classList.contains('input'))) {
    var portEl = target.closest('.side-port') || target;
    var toNode = portEl.getAttribute('data-node');
    var toPort = portEl.getAttribute('data-port');
    if (toNode && toNode !== connecting.sourceNode) {
      for (var i = connections.length - 1; i >= 0; i--) { if (connections[i].to === toNode && connections[i].toPort === toPort) { connections.splice(i, 1); } }
      connections.push({ from: connecting.sourceNode, fromPort: connecting.sourcePort, to: toNode, toPort: toPort });
      renderConnections();
      showToast('已连接');
    }
  }
  var el = document.getElementById('temp-line'); if (el) el.remove();
  connecting.active = false;
  document.removeEventListener('mousemove', onConnectMove);
  document.removeEventListener('mouseup', onConnectEnd);
}
function updateTempLine() {
  var line = document.getElementById('temp-line');
  if (!line || !connecting.active) return;
  var vp = document.getElementById('canvas-viewport'); if (!vp) return;
  var rect = vp.getBoundingClientRect();
  var sx = (connecting.sourceX - rect.left - canvasState.x) / canvasState.scale;
  var sy = (connecting.sourceY - rect.top - canvasState.y) / canvasState.scale;
  var ex = ((connecting.mouseX || 0) - rect.left - canvasState.x) / canvasState.scale;
  var ey = ((connecting.mouseY || 0) - rect.top - canvasState.y) / canvasState.scale;
  var cx = (sx + ex) / 2;
  line.setAttribute('d', 'M' + sx + ' ' + sy + ' C' + cx + ' ' + sy + ',' + cx + ' ' + ey + ',' + ex + ' ' + ey);
}

function renderConnections() {
  var svg = document.getElementById('connections-layer');
  if (!svg) return;
  var vp = document.getElementById('canvas-viewport');
  if (!vp) return;
  var rect = vp.getBoundingClientRect();
  var html = '';
  for (var ci = 0; ci < connections.length; ci++) {
    var c = connections[ci];
    var fn = getNode(c.from), tn = getNode(c.to);
    if (!fn || !tn || !fn.el || !tn.el) continue;
    var fromPortEl = fn.el.querySelector('.side-port[data-port=\"' + c.fromPort + '\"] .side-port-dot');
    var toPortEl = tn.el.querySelector('.side-port[data-port=\"' + c.toPort + '\"] .side-port-dot');
    if (!fromPortEl || !toPortEl) continue;
    var fpRect = fromPortEl.getBoundingClientRect();
    var tpRect = toPortEl.getBoundingClientRect();
    var sx = (fpRect.left + fpRect.width/2 - rect.left - canvasState.x) / canvasState.scale;
    var sy = (fpRect.top + fpRect.height/2 - rect.top - canvasState.y) / canvasState.scale;
    var ex = (tpRect.left + tpRect.width/2 - rect.left - canvasState.x) / canvasState.scale;
    var ey = (tpRect.top + tpRect.height/2 - rect.top - canvasState.y) / canvasState.scale;
    var mx = (sx + ex) / 2;
    var color = c.fromPort === 'prompt' ? '#8B5CF6' : c.fromPort === 'image_url' ? '#10B981' : '#EC4899';
    var midX = (sx + ex) / 2;
    var midY = (sy + ey) / 2;
    html += '<g class=\"conn-group\" data-idx=\"' + ci + '\">';
    html += '<path d=\"M' + sx + ' ' + sy + ' C' + mx + ' ' + sy + ',' + mx + ' ' + ey + ',' + ex + ' ' + ey + '\" stroke=\"' + color + '\" stroke-width=\"8\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0\" class=\"conn-hit\"/>';
    html += '<path d=\"M' + sx + ' ' + sy + ' C' + mx + ' ' + sy + ',' + mx + ' ' + ey + ',' + ex + ' ' + ey + '\" stroke=\"' + color + '\" stroke-width=\"2.5\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.5\" class=\"conn-line\" style=\"cursor:pointer\"/>';
    html += '<circle cx=\"' + ex + '\" cy=\"' + ey + '\" r=\"4\" fill=\"' + color + '\" opacity=\"0.6\"/>';
    html += '<g class=\"conn-delete\" style=\"display:none;cursor:pointer\" onclick=\"removeConnection(' + ci + ')\" transform=\"translate(' + midX + ',' + (midY - 14) + ')\">';
    html += '<circle cx=\"0\" cy=\"0\" r=\"12\" fill=\"var(--card)\" stroke=\"var(--border)\" stroke-width=\"1.5\"/>';
    html += '<path d=\"M-4-3L4 3M4-3L-4 3\" stroke=\"#EF4444\" stroke-width=\"2.5\" stroke-linecap=\"round\"/>';
    html += '</g></g>';
  }
  svg.innerHTML = html;
  svg.querySelectorAll('.conn-group').forEach(function(g) {
    var line = g.querySelector('.conn-line');
    var delBtn = g.querySelector('.conn-delete');
    var timer = null;
    function showDel() { if (delBtn) delBtn.style.display = 'block'; }
    function hideDel() { if (delBtn) delBtn.style.display = 'none'; }
    function onOver() { if (timer) clearTimeout(timer); timer = setTimeout(showDel, 2000); if (line) line.setAttribute('stroke-width', '4'); }
    function onOut() { if (timer) { clearTimeout(timer); timer = null; } hideDel(); if (line) line.setAttribute('stroke-width', '2.5'); }
    g.addEventListener('mouseenter', onOver);
    g.addEventListener('mouseleave', onOut);
  });
}

    case 'image':
      return '<div class="node-preview-area"><input type="text" placeholder="图片生成提示词..." value="' + p + '" oninput="updateNodeData(\'' + node.id + '\',\'prompt\',this.value)"></div><div class="node-params"><div class="param-row"><label>尺寸</label><select onchange="updateNodeData(\'' + node.id + '\',\'resolution\',this.value)"><option value="720x1280">720x1280</option><option value="1080x1920">1080x1920</option><option value="1024x1024">1024x1024</option></select></div></div>';
    case 'video':
      return '<div class="node-preview-area"><div class="node-refs" id="refs-' + node.id + '"><span class="node-ref-empty">连接上游节点以引用</span></div><textarea id="' + node.id + '-textarea" placeholder="输入视频提示词..." oninput="onPromptInput(this,\'' + node.id + '\')">' + p + '</textarea><div class="mention-dropdown" id="mention-' + node.id + '" style="display:none"></div></div><div class="node-params"><div class="param-row"><label>模型</label><select onchange="updateNodeData(\'' + node.id + '\',\'model\',this.value)"><option value="seedance-2" ' + (d.model === 'seedance-2' ? 'selected' : '') + '>Seedance 2.0</option><option value="gen3" ' + (d.model === 'gen3' ? 'selected' : '') + '>Gen-3 Alpha</option><option value="kling" ' + (d.model === 'kling' ? 'selected' : '') + '>Kling 1.5</option><option value="grok" ' + (d.model === 'grok' ? 'selected' : '') + '>Grok</option></select></div><div class="param-row"><label>时长(s)</label><input type="range" min="4" max="15" value="' + dur + '" oninput="updateNodeData(\'' + node.id + '\',\'duration\',parseInt(this.value));document.getElementById(\'dur-val-' + node.id + '\').textContent=this.value"><span class="param-val" id="dur-val-' + node.id + '">' + dur + '</span></div><div class="param-row"><label>运动强度</label><input type="range" min="1" max="10" value="' + mot + '" oninput="updateNodeData(\'' + node.id + '\',\'motion\',parseInt(this.value))"><span class="param-val">' + mot + '</span></div><div class="param-row"><label>比例</label><select onchange="updateNodeData(\' + node.id + \',\'ratio\',this.value)"><option value="16:9" \' + (d.ratio === \'16:9\' ? \'selected\' : \'\') + \'>16:9(横向)</option><option value="9:16" \' + (d.ratio === \'9:16\' ? \'selected\' : \'\') + \'>9:16(纵向)</option><option value="1:1" \' + (d.ratio === \'1:1\' ? \'selected\' : \'\') + \'>1:1(方形)</option><option value="4:3" \' + (d.ratio === \'4:3\' ? \'selected\' : \'\') + \'>4:3</option><option value="3:4" \' + (d.ratio === \'3:4\' ? \'selected\' : \'\') + \'>3:4</option></select></div><div class="param-row"><label>画质</label><select onchange="updateNodeData(\' + node.id + \',\'quality\',this.value)"><option value="480P" \' + (d.quality === \'480P\' ? \'selected\' : \'\') + \'>480P</option><option value="720P" \' + (d.quality === \'720P\' ? \'selected\' : \'\') + \'>720P</option><option value="1080P" \' + (d.quality === \'1080P\' ? \'selected\' : \'\') + \'>1080P</option></select></div></div><div class="node-result" id="result-' + node.id + '" style="display:none"></div>';
    case 'preview':
      return '<div class="node-preview-area"><div class="node-preview-placeholder"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></div></div>';
    default:
      return '';

}
function renderNode(node) {
  var def = NODE_TYPES[node.type];
  if (!def) return;
  var el = document.createElement("div");
  el.className = "workflow-node";
  el.id = node.id;
  el.style.left = Math.round(node.x) + "px";
  el.style.top = Math.round(node.y) + "px";
  var title = (TYPE_NAMES[node.type] || node.type);
  var clrBtn = "<button class=\"node-close\" onclick=\"removeNode(\'" + node.id + "\')\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"/><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"/></svg></button>";
  var portsHTML = renderPorts(node);
  el.innerHTML = "<div class=\"node-header\"><div class=\"node-dot\" style=\"background:" + def.color + "\"></div><span class=\"node-title\">" + title + "</span>" + clrBtn + "</div><div class=\"node-body\">" + getNodeBodyHTML(node) + "</div><div class=\"node-side-ports\">" + portsHTML + "</div>";
  el.addEventListener("mousedown", function (e) {
    if (e.target.closest(".node-close") || e.target.closest(".port") || e.target.closest("textarea") || e.target.closest("input") || e.target.closest("button") || e.target.closest("select") || e.target.closest(".param-btn") || e.target.closest("input[type='range']")) return;
    selectedNode = node.id;
    document.querySelectorAll(".workflow-node").forEach(function (n) { n.classList.remove("selected"); });
    el.classList.add("selected");
    var sx = e.clientX, sy = e.clientY, ox = node.x, oy = node.y;
    function mv(ev) { node.x = ox + (ev.clientX - sx) / (canvasState.scale || 1); node.y = oy + (ev.clientY - sy) / (canvasState.scale || 1); el.style.left = Math.round(node.x) + "px"; el.style.top = Math.round(node.y) + "px"; renderConnections(); }
    function up() { document.removeEventListener("mousemove", mv); document.removeEventListener("mouseup", up); }
    document.addEventListener("mousemove", mv);
    document.addEventListener("mouseup", up);
  });
  var nl = document.getElementById("nodes-layer");
  if (nl) nl.appendChild(el);
  node.el = el;
}
var _origAddNode = addNode;
addNode = function(type, x, y) {
  if (x == null || y == null) {
    var cmMenu = document.getElementById("context-menu");

      x = cmMenu._canvasX;

    }

};

function topologicalSort() {
  var visited = {}, result = [];
  function visit(id) {
    if (visited[id]) return; visited[id] = true;
    for (var ci = 0; ci < connections.length; ci++) { if (connections[ci].from === id) visit(connections[ci].to); }
    for (var ni = 0; ni < nodes.length; ni++) { if (nodes[ni].id === id && result.indexOf(nodes[ni]) < 0) result.push(nodes[ni]); }
  }
  for (var ni = 0; ni < nodes.length; ni++) { var def = NODE_TYPES[nodes[ni].type]; if (!def || !def.inputs || def.inputs.length === 0) visit(nodes[ni].id); }
  for (var ni = 0; ni < nodes.length; ni++) { if (result.indexOf(nodes[ni]) < 0) result.push(nodes[ni]); }
  return result;
}

async function execNode(node) {
  switch (node.type) {
    case "prompt": return { text: node.data.prompt || "" };
    case "text": var p = node.getInput("prompt") || node.data.prompt || "default"; return await SeedanceAPI.generateText(p);
    case "image": var pi = node.getInput("prompt") || node.data.prompt || "default"; return await SeedanceAPI.generateImage(pi);
    case "video":
      var pv = node.getInput("prompt") || node.data.prompt || "default";
      var refImages = node.getInput("image_url");
      var refVideos = node.getInput("video_url");
      var params = { prompt: pv, duration: node.data.duration || 5, ratio: node.data.ratio || "16:9", quality: node.data.quality || "720P" };
      if (refImages) { params.image_urls = refImages; }
      if (refVideos) { params.video_urls = refVideos; }
      return await SeedanceAPI.generateVideo(params);
    case "preview": var res = node.getInput("video_url") || node.getInput("image_url") || node.getInput("text"); return { result: res };
    default: return {};
  }
}

async function executeWorkflow() {
  if (nodes.length === 0) { showToast("工作流为空，请先添加节点", "error"); return; }
  showToast("开始执行工作流...");
  var sorted = topologicalSort();
  for (var si = 0; si < sorted.length; si++) {
    var n = sorted[si];
    try {
      var result = await execNode(n);
      n.lastResult = result;
      var resEl = document.getElementById("result-" + n.id);
      if (resEl) {
        resEl.style.display = "block";
        if (result.video_url) { resEl.innerHTML = '<video src="' + result.video_url + '" controls style="width:100%;border-radius:6px;display:block"></video>'; }
        else if (result.image_url) { resEl.innerHTML = '<img src="' + result.image_url + '" style="width:100%;border-radius:6px">'; }
        else if (result.text) { resEl.innerHTML = result.text.substring(0, 200); }
        else { resEl.innerHTML = "执行完成"; }
      }
      addOutput(n, result);
    } catch (e) { console.error(e); showToast("节点 " + n.id + " 执行失败", "error"); }
  }
  showToast("工作流执行完成");
}

function addOutput(node, result) {
  var body = document.getElementById("output-body"); if (!body) return;
  var empty = body.querySelector(".output-empty"); if (empty) empty.remove();
  var el = document.createElement("div"); el.className = "output-item";
  var content = "";
  if (result.video_url) content = '<video src="' + result.video_url + '" controls style="width:100%;border-radius:6px"></video>';
  else if (result.image_url) content = '<img src="' + result.image_url + '" style="width:100%;border-radius:6px">';
  else if (result.text) content = result.text.substring(0, 150);
  else content = "节点 " + node.id + " 输出";
  el.innerHTML = '<div class="output-item-label">' + (TYPE_NAMES[node.type] || node.type) + '</div><div class="output-item-value">' + content + '</div>';
  body.prepend(el);
}
