<script>
(function(){
  if(typeof SeedanceAPI==='undefined')return;
  if(!localStorage.getItem('seedance_api_key')&&SeedanceAPI.apiKey)SeedanceAPI.setApiKey(SeedanceAPI.apiKey);
  if(!localStorage.getItem('deepseek_api_key')&&SeedanceAPI.deepseekKey)SeedanceAPI.setDeepSeekKey(SeedanceAPI.deepseekKey);
})();
function toggleApiInput(){
  var popup=document.getElementById('api-input-popup');
  if(!popup)return;
  if(popup.style.display==='block'){popup.style.display='none';return}
  var el=document.getElementById('api-key-input');if(el)el.value=localStorage.getItem('seedance_api_key')||'';
  var dkEl=document.getElementById('deepseek-key-input');if(dkEl)dkEl.value=localStorage.getItem('deepseek_api_key')||'';
  popup.style.display='block'
}
function saveApiKey(){
  var k=document.getElementById('api-key-input');
  if(!k||!k.value.trim())return;
  SeedanceAPI.setApiKey(k.value.trim());
  var p2=document.getElementById('api-input-popup');if(p2)p2.style.display='none';
  if(typeof showToast==='function')showToast('API Key 已保存');
}
function saveDeepSeekKey(){
  var k=document.getElementById('deepseek-key-input');
  if(!k||!k.value.trim())return;
  SeedanceAPI.setDeepSeekKey(k.value.trim());
  var p3=document.getElementById('api-input-popup');if(p3)p3.style.display='none';
  if(typeof showToast==='function')showToast('DeepSeek Key 已保存');
}
</script>
